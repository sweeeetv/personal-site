# .github/workflows/test.yml
name: Test OIDC Auth #no rule. must be readable, shows up in the "Actions" tab

on: # trigger
  workflow_dispatch:  # manual trigger only

permissions:
  id-token: write   # allows GitHub to mint the JWT
  contents: read

jobs:
  test-auth:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify access
        run: |
          az account show
          az group show --name rg-resume