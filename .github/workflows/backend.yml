name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: # 1. REQUIRED FOR OIDC
  id-token: write
  contents: read

env:
  AZURE_FUNCTIONAPP_NAME: "weirdcloud-visiter-counter-api"
  PYTHON_VERSION: "3.11" # Recommended for Flex Consumption for stability

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@v4

      - name: "Login via Azure (OIDC)" # 2. UPDATED LOGIN
        uses: azure/login@v2 # Use v2 for OIDC support
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: "Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: "Deploy to Azure Functions"
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: "."
          remote-build: true
